document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

::-webkit-scrollbar-track { background: transparent; }\n    input[type=range] { -webkit-appearance: none; appearance: none; height: 3px; border-radius: 3px; outline: none; cursor: pointer; }\n    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #fff; border: 1px solid rgba(0,0,0,0.18); box-shadow: 0 1px 2px rgba(0,0,0,0.28); }\n    input[type=text]::placeholder, textarea::placeholder { color: rgba(128,140,162,0.85); }\n    input:focus, textarea:focus { outline: none; }\n    @keyframes blink { 0%,80%,100%{opacity:0.25;} 40%{opacity:1;} }\n    @keyframes fadein { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:fixed; inset:0; display:flex; flex-direction:column; color:{{ t.text }}; font-family:'Lato',system-ui,sans-serif;\">\n\n  <div style=\"position:relative; flex:1; min-height:0; overflow:hidden;\">\n\n    <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;\"><\u002Fcanvas>\n\n    <div style=\"position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:22; display:flex; align-items:center; gap:14px; padding:8px 8px 8px 16px; border-radius:12px; background:{{ t.solidBg }}; border:1px solid {{ t.border }}; box-shadow:{{ t.barShadow }};\">\n      <div style=\"display:flex; align-items:center; gap:16px; font-family:'Lato',sans-serif; font-size:12px; color:{{ t.textDim }};\">\n        <div><span style=\"color:{{ t.text }}; font-weight:700;\">{{ shownCountFmt }}<\u002Fspan> papers<\u002Fdiv>\n        <div><span style=\"color:{{ t.text }}; font-weight:700;\">{{ edgeCountFmt }}<\u002Fspan> citations<\u002Fdiv>\n        <div><span style=\"color:{{ t.text }}; font-weight:700;\">{{ selCountFmt }}<\u002Fspan> selected<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px; height:20px; background:{{ t.bord div>\n              <div style=\"font-size:18px; font-weight:700; line-height:1.32; text-wrap:pretty; margin-bottom:9px;\">{{ detailTitle }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:{{ t.textDim }}; margin-bottom:18px;\">{{ detailAuthors }}<\u002Fdiv>\n\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:15px 16px; margin-bottom:20px;\">\n                <sc-for list=\"{{ detailMeta }}\" as=\"mi\" hint-placeholder-count=\"4\">\n                  <div>\n                    <div style=\"font-size:10.5px; letter-spacing:0.02em; color:{{ t.textFaint }}; margin-bottom:4px;\">{{ mi.label }}<\u002Fdiv>\n                    <div style=\"font-size:14px; font-weight:700; color:{{ t.text }}; line-height:1.3;\">{{ mi.value }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"font-size:11.5px; letter-spacing:0.02em; font-weight:700; color:{{ t.textDim }}; margin-bottom:8px;\">Abstract<\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.66; color:{{ t.text }}; margin-bottom:16px; text-wrap:pretty;\">{{ detailAbstract }}<\u002Fdiv>\n\n              <div style=\"font-size:11.5px; color:{{ t.textFaint }}; margin-bottom:18px; word-break:break-all;\">DOI: {{ detailDoi }}<\u002Fdiv>\n\n              <div style=\"display:flex; gap:8px;\">\n                <button sc-camel-on-click=\"{{ detailFocus }}\" style=\"flex:1; padding:10px; border-radius:9px; cursor:pointer; font-family:'Lato',sans-serif; font-size:12.5px; font-weight:700; border:1px solid {{ t.accent }}; background:{{ t.accent }}; color:{{ t.onAccent }};\">Focus in Graph<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ detailRemove }}\" style=\"flex:0 0 auto; padding:10px 14px; border-radius:9px; cursor:pointer; font-family:'Lato',sans-serif; font-size:12.5px; font-weight:700; border:1px solid {{ t.border }}; background:transparent; color:{{ t.textDim }};\">Remove<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noDetail }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:13px; font-weight:700; line-height:1.6; color:{{ t.textDim }}; padding:8px 0;\">Select a paper in the graph — or tap one in the list above — to read its abstract and full details here.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ rightClosed }}\" hint-placeholder-val=\"{{ false }}\">\n        <button sc-camel-on-click=\"{{ toggleRight }}\" title=\"Expand copilot\" style=\"width:100%; display:flex; align-items:center; gap:9px; padding:13px 14px; background:none; border:none; color:{{ t.textDim }}; cursor:pointer; white-space:nowrap;\" style-hover=\"color:{{ t.text }};\">\n          <span style=\"font-size:15px;\">✧<\u002Fspan>\n          <span style=\"font-size:13px; letter-spacing:0.01em; font-weight:700; font-family:'Lato',sans-serif;\">Copilot<\u002Fspan>\n          <span style=\"flex:1;\"><\u002Fspan>\n          <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-size:11px; font-weight:700; font-family:'Lato',sans-serif; color:{{ t.accent }};\">{{ selCountFmt }}<\u002Fspan>\n          <\u002Fsc-if>\n          <span style=\"font-size:14px; line-height:1;\">‹<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nconst THEMES = {\n  deepspace: {\n    accent:\"#7fe0ff\", text:\"#f2f6fc\", textDim:\"#cbd8ec\", textFaint:\"#aab8d4\",\n    border:\"rgba(120,160,220,0.15)\", panelBg:\"#0b1220\", barBg:\"rgba(6,10,20,0.72)\",\n    cardBg:\"rgba(11,18,32,0.86)\", inputBg:\"rgba(255,255,255,0.04)\", chipBg:\"rgba(255,255,255,0.045)\",\n    botBubble:\"rgba(255,255,255,0.05)\", trackBg:\"rgba(120,160,220,0.2)\",\n    bgInner:\"#0a1224\", bgOuter:\"#02040a\", edgeRGB:[90,130,190], edgeAlpha:0.18, labelColor:\"rgba(232,238,248,0.92)\",\n    swatch:\"#57d6ff\", onAccent:\"#04060c\", solidBg:\"#0b1220\",\n    panelShadow:\"0 20px 50px rgba(0,0,0,0.35)\", barShadow:\"0 12px 34px rgba(0,0,0,0.32)\", cardShadow:\"0 18px 50px rgba(0,0,0,0.5)\"\n  },\n  light: {\n    accent:\"#0a6cff\", text:\"#141b2e\", textDim:\"#48546c\", textFaint:\"#8a94aa\",\n    border:\"rgba(30,50,90,0.13)\", panelBg:\"rgba(255,255,255,0.82)\", barBg:\"rgba(255,255,255,0.82)\",\n    cardBg:\"rgba(255,255,255,0.9)\", inputBg:\"rgba(30,50,90,0.045)\", chipBg:\"rgba(30,50,90,0.045)\",\n    botBubble:\"rgba(30,50,90,0.045)\", trackBg:\"rgba(30,50,90,0.16)\",\n    bgInner:\"#eef3fa\", bgOuter:\"#d6deec\", edgeRGB:[110,130,170], edgeAlpha:0.28, labelColor:\"rgba(20,27,46,0.9)\",\n    swatch:\"#0a6cff\", onAccent:\"#ffffff\", solidBg:\"#ffffff\",\n    panelShadow:\"0 10px 28px rgba(30,50,90,0.12)\", barShadow:\"0 6px 18px rgba(30,50,90,0.10)\", cardShadow:\"0 10px 28px rgba(30,50,90,0.15)\"\n  },\n  nebula: {\n    accent:\"#ea9bff\", text:\"#f7f1fb\", textDim:\"#e0d0ec\", textFaint:\"#c4b4d6\",\n    border:\"rgba(200,140,230,0.16)\", panelBg:\"#140b1e\", barBg:\"rgba(11,6,17,0.74)\",\n    cardBg:\"rgba(22,12,32,0.86)\", inputBg:\"rgba(255,255,255,0.04)\", chipBg:\"rgba(255,255,255,0.05)\",\n    botBubble:\"rgba(255,255,255,0.05)\", trackBg:\"rgba(200,140,230,0.22)\",\n    bgInner:\"#160a22\", bgOuter:\"#050208\", edgeRGB:[150,90,180], edgeAlpha:0.18, labelColor:\"rgba(243,236,248,0.92)\",\n    swatch:\"#e07dff\", onAccent:\"#04060c\", solidBg:\"#140b1e\",\n    panelShadow:\"0 20px 50px rgba(0,0,0,0.35)\", barShadow:\"0 12px 34px rgba(0,0,0,0.32)\", cardShadow:\"0 18px 50px rgba(0,0,0,0.5)\"\n  },\n  observatory: {\n    accent:\"#f5d47e\", text:\"#f8f2e6\", textDim:\"#e8dcc2\", textFaint:\"#ccbf9c\",\n    border:\"rgba(230,200,150,0.16)\", panelBg:\"#151009\", barBg:\"rgba(11,8,4,0.76)\",\n    cardBg:\"rgba(24,18,9,0.88)\", inputBg:\"rgba(255,255,255,0.035)\", chipBg:\"rgba(255,255,255,0.04)\",\n    botBubble:\"rgba(255,255,255,0.045)\", trackBg:\"rgba(230,200,150,0.22)\",\n    bgInner:\"#171207\", bgOuter:\"#060402\", edgeRGB:[180,150,90], edgeAlpha:0.16, labelColor:\"rgba(244,237,224,0.92)\",\n    swatch:\"#f0c860\", onAccent:\"#04060c\", solidBg:\"#151009\",\n    panelShadow:\"0 20px 50px rgba(0,0,0,0.35)\", barShadow:\"0 12px 34px rgba(0,0,0,0.32)\", cardShadow:\"0 18px 50px rgba(0,0,0,0.5)\"\n  }\n};\n\nconst TOPN = [ {v:100,label:\"100\"}, {v:1000,label:\"1K\"}, {v:10000,label:\"10K\"}, {v:100000,label:\"100K\"} ];\nconst PROMPTS = [\n  \"Summarize the selected papers\",\n  \"How are these connected?\",\n  \"Explain the key method\",\n  \"Why are these so highly cited?\"\n];\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.canvasRef = React.createRef();\n    this.cardRef = React.createRef();\n    this.scrollRef = React.createRef();\n    this.inputRef = React.createRef();\n    const active = {};\n    [\"genetics\",\"ai\",\"physics\",\"chemistry\",\"medicine\",\"neuro\",\"cs\",\"economics\"].forEach(k=>active[k]=true);\n    this.state = {\n      themeKey:\"deepspace\", leftOpen:true, rightOpen:true,\n      keyword:\"\", topN:1000, yearMin:1935, yearMax:2024, minCites:0, activeFields:active,\n      availOA:false, availPdf:false, availGrobid:false,\n      copilotTab:\"chat\", detailId:null, selectedIds:[], cardNodeId:null, fieldCounts:{}, availCounts:{oa:0,pdf:0,grobid:0}, yearBins:[], citeBins:[], shownCount:0, edgeCount:0,\n      messages:[{ role:\"assistant\", text:\"Hi — I'm your research copilot. Click glowing papers in the graph to select them, then ask me to summarize, compare, or explain their methods.\" }],\n      chatInput:\"\", typing:false, ready:false\n    };\n    this._card = null;\n  }\n\n  async componentDidMount(){\n    const [{ ForceGraph3D }, { buildGraph, FIELDS }] = await Promise.all([\n      import(window.__resources.force3d), import(window.__resources.graphData)\n    ]);\n    this.FIELDS = FIELDS;\n    this.full = buildGraph(2400);\n    this.nodeById = new Map(this.full.nodes.map(n=>[n.id,n]));\n    const th = THEMES[this.state.themeKey];\n    this.engine = new ForceGraph3D(this.canvasRef.current, {\n      theme:{ bgInner:th.bgInner, bgOuter:th.bgOuter, edgeRGB:th.edgeRGB, edgeAlpha:th.edgeAlpha, labelColor:th.labelColor, light:this.state.themeKey===\"light\" },\n      fields: FIELDS,\n      onSelect: (node)=>{ this._dismissedId=null; this.setState({ selectedIds:[...this.engine.selected], detailId:node.id }); },\n      onHover: ()=>{},\n      onHud: (hud)=> this._onHud(hud)\n    });\n    this.engine.setData(this.full.nodes, this.full.edges);\n    this._ro = new ResizeObserver(()=> this.engine && this.engine.resize());\n    this._ro.observe(this.canvasRef.current);\n    this.setState({ ready:true }, ()=> this.applyFilters());\n  }\n\n  componentWillUnmount(){ if(this.engine) this.engine.dispose(); if(this._ro) this._ro.disconnect(); if(this._kwT) clearTimeout(this._kwT); }\n\n  _onHud(hud){\n    const el = this.cardRef.current; if(!el) return;\n    const c = hud.card;\n    const hide = ()=>{ el.style.opacity=\"0\"; if(this.state.cardNodeId!==null) this.setState({cardNodeId:null}); };\n    const show = (card)=>{\n      const rect = this.canvasRef.current.getBoundingClientRect();\n      const w = 288, margin = 16;\n      let x = card.x + 18, y = card.y - 20;\n      if (x + w > rect.width - margin) x = card.x - w - 18;\n      x = Math.max(margin, Math.min(rect.width - w - margin, x));\n      y = Math.max(margin, Math.min(rect.height - 210, y));\n      el.style.transform = `translate(${x}px, ${y}px)`;\n      el.style.opacity = \"1\";\n      if (card.id !== this.state.cardNodeId) this.setState({ cardNodeId: card.id });\n    };\n    if (!c){ hide(); return; }\n    if (c.hover){\n      // hovering a node: permanently dismiss any sticky (selection) card that isn't this one\n      if (this._stickyId != null && this._stickyId !== c.id) this._dismissedId = this._stickyId;\n      show(c);\n    } else {\n      // card driven by the last-selected node\n      if (c.id === this._dismissedId){ hide(); return; }\n      this._stickyId = c.id;\n      show(c);\n    }\n  }\n\n  applyFilters(){\n    if (!this.engine || !this.full) return;\n    const s = this.state;\n    const kw = s.keyword.trim().toLowerCase();\n    const top = this.full.nodes.slice(0, Math.min(s.topN, this.full.nodes.length));\n    // field counts ignore the field toggle but respect other filters\n    const counts = {};\n    Object.keys(s.activeFields).forEach(k=>counts[k]=0);\n    const NBINS = 30, binSpan = (2025-1935)/NBINS;\n    const yearBins = new Array(NBINS).fill(0);\n    const CITEMAX = 40000, citeSpan = CITEMAX/NBINS;\n    const citeBins = new Array(NBINS).fill(0);\n    const availCounts = { oa:0, pdf:0, grobid:0 };\n    const availMatch = (n)=> (!s.availOA || n.openAccess) && (!s.availPdf || n.hasPdf) && (!s.availGrobid || n.hasGrobid);\n    const kept = [];\n    for (const n of top){\n      const kwMatch = (kw===\"\" || n.title.toLowerCase().includes(kw) || n.authors.toLowerCase().includes(kw));\n      const am = availMatch(n);\n      const passNoYear = n.citations>=s.minCites && s.activeFields[n.field] && kwMatch && am;\n      if (passNoYear){\n        let bi=Math.floor((n.year-1935)/binSpan); bi=Math.max(0,Math.min(NBINS-1,bi));\n        yearBins[bi]++;\n      }\n      const passNoCite = n.year>=s.yearMin && n.year<=s.yearMax && s.activeFields[n.field] && kwMatch && am;\n      if (passNoCite){\n        let ci=Math.floor(n.citations/citeSpan); ci=Math.max(0,Math.min(NBINS-1,ci));\n        citeBins[ci]++;\n      }\n      const passNonField = n.year>=s.yearMin && n.year<=s.yearMax && n.citations>=s.minCites && kwMatch && am;\n      if (passNonField) counts[n.field] = (counts[n.field]||0)+1;\n      // availability counts respect every OTHER filter but not availability itself\n      const passNoAvail = n.year>=s.yearMin && n.year<=s.yearMax && n.citations>=s.minCites && s.activeFields[n.field] && kwMatch;\n      if (passNoAvail){ if(n.openAccess) availCounts.oa++; if(n.hasPdf) availCounts.pdf++; if(n.hasGrobid) availCounts.grobid++; }\n      if (passNonField && s.activeFields[n.field]) kept.push(n);\n    }\n    const keepIds = new Set(kept.map(n=>n.id));\n    let edgeCount = 0;\n    for (const e of this.full.edges) if (keepIds.has(e.source) && keepIds.has(e.target)) edgeCount++;\n    this.engine.setVisible(keepIds);\n    this.setState({ shownCount:kept.length, edgeCount, fieldCounts:counts, availCounts, yearBins, citeBins });\n  }\n\n  setTheme(key){\n    const th = THEMES[key];\n    if (this.engine) this.engine.setTheme({ bgInner:th.bgInner, bgOuter:th.bgOuter, edgeRGB:th.edgeRGB, edgeAlpha:th.edgeAlpha, labelColor:th.labelColor, light:key===\"light\" });\n    this.setState({ themeKey:key });\n  }\n\n  toggleMode(){ this.setTheme(this.state.themeKey===\"light\" ? \"deepspace\" : \"light\"); }\n  setTab(tab){ this.setState({copilotTab:tab}); }\n  setDetail(id){ this.setState({detailId:id}); }\n  toggleField(k){ const a={...this.state.activeFields}; a[k]=!a[k]; this.setState({activeFields:a}, ()=>this.applyFilters()); }\n  toggleAvail(k){ this.setState({[k]:!this.state[k]}, ()=>this.applyFilters()); }\n  toggleAllFields(){ const keys=Object.keys(this.state.activeFields); const allOn=keys.every(k=>this.state.activeFields[k]); const a={}; keys.forEach(k=>a[k]=!allOn); this.setState({activeFields:a}, ()=>this.applyFilters()); }\n  setTopN(v){ this.setState({topN:v}, ()=>this.applyFilters()); }\n  onKeyword(e){ const v=e.target.value; this.setState({keyword:v}); if(this._kwT) clearTimeout(this._kwT); this._kwT=setTimeout(()=>this.applyFilters(),240); }\n  onYearMin(e){ let v=+e.target.value; v=Math.min(v,this.state.yearMax); this.setState({yearMin:v}, ()=>this.applyFilters()); }\n  onYearMax(e){ let v=+e.target.value; v=Math.max(v,this.state.yearMin); this.setState({yearMax:v}, ()=>this.applyFilters()); }\n  onMinCites(e){ this.setState({minCites:+e.target.value}, ()=>this.applyFilters()); }\n\n  removeSelected(id){ this.engine.selected.delete(id); this.setState({selectedIds:[...this.engine.selected]}); }\n  clearSelection(){ this.engine.selected.clear(); this.setState({selectedIds:[]}); }\n  focusNode(id){ if(this.engine) this.engine.focusNode(id); }\n  resetView(){ if(this.engine) this.engine.resetView(); }\n  closeCard(){ this._dismissedId = this.state.cardNodeId; if(this.cardRef.current) this.cardRef.current.style.opacity=\"0\"; if(this.state.cardNodeId!==null) this.setState({cardNodeId:null}); }\n\n  onChatInput(e){ this.setState({chatInput:e.target.value}); const el=this.inputRef.current; if(el){ el.style.height=\"auto\"; el.style.height=Math.min(96,el.scrollHeight)+\"px\"; } }\n  onChatKey(e){ if(e.key===\"Enter\" && !e.shiftKey){ e.preventDefault(); this.sendChat(); } }\n\n  _scrollChat(){ requestAnimationFrame(()=>{ const el=this.scrollRef.current; if(el) el.scrollTop=el.scrollHeight; }); }\n\n  send(text){\n    const t=(text||\"\").trim(); if(!t) return;\n    const msgs=[...this.state.messages, {role:\"user\", text:t}];\n    this.setState({messages:msgs, chatInput:\"\", typing:true});\n    const el=this.inputRef.current; if(el) el.style.height=\"auto\";\n    this._scrollChat();\n    setTimeout(()=>{\n      const reply=this._genReply(t);\n      this.setState({messages:[...this.state.messages, {role:\"assistant\", text:reply}], typing:false});\n      this._scrollChat();\n    }, 900 + Math.random()*700);\n  }\n  sendChat(){ this.send(this.state.chatInput); }\n\n  _genReply(q){\n    const sel=[...this.engine.selected].map(id=>this.nodeById.get(id)).filter(Boolean);\n    if (!sel.length) return \"Select one or more papers in the graph first — click any glowing node. Then I can summarize them, compare their methods, or trace how they cite each other.\";\n    const titles=sel.map(p=>`“${p.title}” (${p.authors}, ${p.year})`);\n    const ql=q.toLowerCase();\n    const fields=[...new Set(sel.map(p=>this.FIELDS[p.field].label))];\n    const totalCites=sel.reduce((a,p)=>a+p.citations,0);\n    if (sel.length===1){\n      const p=sel[0];\n      if (ql.includes(\"method\")) return `The central contribution of ${titles[0]} is methodological: it introduced an approach in ${this.FIELDS[p.field].label.toLowerCase()} that later work adopted almost verbatim. With ${p.citations.toLocaleString()} citations it functions as a foundational reference — most of its downstream edges in the graph point back to it as a \"method cite.\"`;\n      if (ql.includes(\"why\") || ql.includes(\"cited\")) return `${titles[0]} is cited ${p.citations.toLocaleString()} times because it became the canonical reference for its technique — the kind of paper you cite by reflex when you use the method. Its position near the dense core of the ${this.FIELDS[p.field].label.toLowerCase()} cluster reflects that gravitational pull.`;\n      return `${titles[0]} sits in ${this.FIELDS[p.field].label} with ${p.citations.toLocaleString()} citations. It anchors a tight neighborhood of follow-on work — select a few of its neighbors and I can explain how they build on it.`;\n    }\n    if (ql.includes(\"connect\") || ql.includes(\"related\") || ql.includes(\"relationship\")){\n      return `You've selected ${sel.length} papers spanning ${fields.join(\", \")}. In the citation graph they connect through shared methodological lineage: the more recent ones cite the earlier ones as foundational references. The visible edges between them trace that intellectual descent — highlighted in cluster color when you hover a node.`;\n    }\n    if (ql.includes(\"compare\") || ql.includes(\"differ\")){\n      return `Comparing your selection: ${titles.join(\"; \")}. They differ mainly in scope — earlier works establish general principles while later ones operationalize them. Collectively they account for roughly ${totalCites.toLocaleString()} citations, a signal of how load-bearing this thread is across ${fields.join(\" and \")}.`;\n    }\n    return `Here's a synthesis of your ${sel.length} selected papers (${fields.join(\", \")}): ${titles.slice(0,3).join(\"; \")}${sel.length>3?`, and ${sel.length-3} more`:\"\"}. Together they form a coherent citation cluster — the seminal results seed the region and the surrounding nodes extend or apply them. Combined they hold about ${totalCites.toLocaleString()} citations. Ask me to compare their methods or trace how they cite one another.`;\n  }\n\n  renderVals(){\n    const s=this.state, t=THEMES[s.themeKey], F=this.FIELDS||{};\n    const fmt=(n)=> n>=1000 ? (n/1000).toFixed(n>=10000?0:1).replace(/\\.0$/,\"\")+\"K\" : \"\"+n;\n    const light = s.themeKey===\"light\";\n    const darken = (rgb)=>`rgb(${Math.round(rgb[0]*0.5)},${Math.round(rgb[1]*0.5)},${Math.round(rgb[2]*0.5)})`;\n    const lastSel = s.selectedIds.length ? s.selectedIds[s.selectedIds.length-1] : null;\n    const activeDetailId = (s.detailId!=null && s.selectedIds.includes(s.detailId)) ? s.detailId : lastSel;\n\n    // theme swatches\n    const themeList = Object.keys(THEMES).map(key=>{\n      const on=key===s.themeKey; const c=THEMES[key];\n      return { label:key, onClick:()=>this.setTheme(key),\n        style:`width:20px; height:20px; border-radius:50%; cursor:pointer; background:${c.swatch}; border:2px solid ${on?\"#fff\":\"transparent\"}; box-shadow:${on?`0 0 10px ${c.swatch}`:\"none\"}; opacity:${on?1:0.55}; transition:all .15s;` };\n    });\n\n    // legend\n    const legendList = Object.keys(F).map(k=>({ label:F[k].label, color:`rgb(${F[k].rgb.join(\",\")})` }));\n\n    // topN\n    const topNList = TOPN.map(o=>{\n      const on=o.v===s.topN;\n      return { label:o.label, onClick:()=>this.setTopN(o.v),\n        style:`flex:1; padding:9px 4px; border-radius:9px; font-size:13px; font-weight:${on?700:400}; cursor:pointer; font-family:'Lato',sans-serif; border:1px solid ${on?t.accent:t.border}; background:${on?t.chipBg:\"transparent\"}; color:${on?t.text:t.textDim};` };\n    });\n    const loaded = Math.min(s.topN, 2400);\n    const corpusNote = s.topN>2400 ? `Showing top ${loaded.toLocaleString()} (representative sample)` : `Top ${loaded.toLocaleString()} by citation count`;\n\n    // fields\n    const fc=s.fieldCounts||{};\n    const fieldsList = Object.keys(F).map(k=>{\n      const on=s.activeFields[k]; const rgb=F[k].rgb; const col=`rgb(${rgb.join(\",\")})`;\n      return { key:k, label:F[k].label, count:(fc[k]||0).toLocaleString(),\n        onClick:()=>this.toggleField(k),\n        dot: on?col:\"transparent\",\n        dotShadow: on?`0 0 8px ${col}`:\"none\",\n        textColor: on?t.text:t.textFaint,\n        rowStyle:`display:flex; align-items:center; gap:9px; padding:6px 8px 6px 0; border-radius:8px; cursor:pointer; background:transparent; border:1px solid transparent; ${on?\"\":\"opacity:0.55;\"} border-color:${on?\"transparent\":\"transparent\"}; width:100%; font-family:'Lato',sans-serif; text-align:left; border:1px solid ${on?F[k].rgb&&\"transparent\":\"transparent\"};` };\n    });\n    const allOn=Object.keys(s.activeFields).every(k=>s.activeFields[k]);\n\n    // availability filters\n    const ac = s.availCounts || {oa:0,pdf:0,grobid:0};\n    const AVAIL = [\n      { key:\"availOA\",     label:\"Open Access\",     count:ac.oa },\n      { key:\"availPdf\",    label:\"Has PDF Link\",    count:ac.pdf },\n      { key:\"availGrobid\", label:\"Has GROBID XML\",  count:ac.grobid },\n    ];\n    const availList = AVAIL.map(a=>{\n      const on=!!s[a.key];\n      return { key:a.key, label:a.label, count:(a.count||0).toLocaleString(),\n        onClick:()=>this.toggleAvail(a.key),\n        check: on?\"✓\":\"\", checkOpacity: on?1:0,\n        textColor: on?t.text:t.textFaint,\n        boxStyle:`display:flex; align-items:center; justify-content:center; width:16px; height:16px; flex:0 0 auto; border-radius:5px; font-size:11px; font-weight:900; border:1px solid ${on?t.accent:t.border}; background:${on?t.accent:\"transparent\"}; color:${t.onAccent};`,\n        rowStyle:`display:flex; align-items:center; gap:9px; padding:6px 8px 6px 0; border-radius:8px; cursor:pointer; background:transparent; border:1px solid transparent; ${on?\"\":\"opacity:0.6;\"} width:100%; font-family:'Lato',sans-serif; text-align:left;` };\n    });\n\n    // year histogram\n    const bins = s.yearBins || [];\n    const NB = bins.length || 30;\n    const binSpan = (2025-1935)/NB;\n    const maxB = Math.max(1, ...bins);\n    const yearHistList = bins.map((cnt,i)=>{\n      const bc = 1935 + binSpan*(i+0.5);\n      const inRange = bc>=s.yearMin && bc<=s.yearMax;\n      const hpct = cnt>0 ? Math.max(7, Math.round((cnt/maxB)*100)) : 3;\n      return { style:`flex:1 1 0; min-width:0; height:${hpct}%; border-radius:2px 2px 0 0; background:${inRange? t.accent : t.trackBg}; opacity:${inRange?0.9:0.5};` };\n    });\n\n    // citations histogram (sqrt-scaled heights so the long tail is visible)\n    const cbins = s.citeBins || [];\n    const NCB = cbins.length || 30;\n    const cSpan = 40000/NCB;\n    const maxCB = Math.max(1, ...cbins.map(v=>Math.sqrt(v)));\n    const citeHistList = cbins.map((cnt,i)=>{\n      const bcv = cSpan*(i+0.5);\n      const inRange = bcv >= s.minCites;\n      const hpct = cnt>0 ? Math.max(7, Math.round((Math.sqrt(cnt)/maxCB)*100)) : 3;\n      return { style:`flex:1 1 0; min-width:0; height:${hpct}%; border-radius:2px 2px 0 0; background:${inRange? t.accent : t.trackBg}; opacity:${inRange?0.9:0.5};` };\n    });\n\n    // selection\n    const selectedList = s.selectedIds.map(id=>{ const n=this.nodeById&&this.nodeById.get(id); if(!n) return null;\n      const active = id===activeDetailId;\n      return { id, title:n.title, color:`rgb(${F[n.field].rgb.join(\",\")})`, active,\n        wrapStyle:`display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:9px; background:${t.chipBg}; border:1px solid ${active?t.accent:t.border};`,\n        onRemove:()=>this.removeSelected(id), onFocus:()=>{ this.focusNode(id); this.setDetail(id); } }; }).filter(Boolean);\n\n    // messages\n    const messages = s.messages.map((m,i)=>{\n      const user=m.role===\"user\";\n      return { text:m.text, showLabel:!user,\n        wrap:`display:flex; flex-direction:column; ${user?\"align-items:flex-end;\":\"align-items:flex-start;\"} animation:fadein .3s ease;`,\n        bubble: user\n          ? `max-width:88%; padding:10px 13px; border-radius:14px 14px 4px 14px; background:${t.accent}; color:${t.onAccent}; font-size:14.5px; line-height:1.5; font-weight:400;`\n          : `max-width:94%; padding:11px 14px; border-radius:4px 14px 14px 14px; background:${t.botBubble}; border:1px solid ${t.border}; color:${t.text}; font-size:14.5px; line-height:1.62; font-weight:400;` };\n    });\n\n    // card\n    const cardNode = s.cardNodeId!=null && this.nodeById ? this.nodeById.get(s.cardNodeId) : null;\n    let cardColor=\"#fff\", cardLabelColor=\"#fff\", cardFieldLabel=\"\", cardTitle=\"\", cardAuthors=\"\", cardYear=\"\", cardRank=\"\", cardCitesFmt=\"\", cardDegree=0, cardBtnLabel=\"\", cardBtnStyle=\"\", cardToggleSelect=()=>{};\n    if (cardNode){\n      cardColor=`rgb(${F[cardNode.field].rgb.join(\",\")})`;\n      cardLabelColor = light ? darken(F[cardNode.field].rgb) : cardColor;\n      cardFieldLabel=F[cardNode.field].label; cardTitle=cardNode.title; cardAuthors=cardNode.authors;\n      cardYear=cardNode.year; cardRank=cardNode.rank.toLocaleString(); cardCitesFmt=cardNode.citations.toLocaleString();\n      cardDegree = this.engine ? (this.engine.adj.get(cardNode.id)||[]).length : 0;\n      const sel=this.engine && this.engine.selected.has(cardNode.id);\n      cardBtnLabel = sel?\"Remove from selection\":\"Add to selection\";\n      cardBtnStyle=`width:100%; padding:9px; border-radius:9px; cursor:pointer; font-family:'Lato',sans-serif; font-size:12.5px; font-weight:500; border:1px solid ${sel?t.border:t.accent}; background:${sel?\"transparent\":t.accent}; color:${sel?t.textDim:t.onAccent};`;\n      cardToggleSelect=()=>{ this.engine.toggleSelect(cardNode.id); this.setState({selectedIds:[...this.engine.selected]}); };\n    }\n\n    const promptList = PROMPTS.map(p=>({ label:p, onClick:()=>this.send(p) }));\n    const canSend = s.chatInput.trim().length>0;\n\n    // paper detail view\n    const chatTab = s.copilotTab!==\"details\", detailsTab = s.copilotTab===\"details\";\n    const tabBtn = (on)=>`padding:5px 12px; border-radius:7px; border:none; cursor:pointer; font-family:'Lato',sans-serif; font-size:11.5px; font-weight:700; background:${on?t.accent:\"transparent\"}; color:${on?t.onAccent:t.textDim};`;\n    const detailNode = activeDetailId!=null && this.nodeById ? this.nodeById.get(activeDetailId) : null;\n    let detailColor=\"#fff\", detailLabelColor=\"#fff\", detailFieldLabel=\"\", detailTitle=\"\", detailAuthors=\"\", detailRank=\"\", detailAbstract=\"\", detailDoi=\"\", detailMeta=[], detailFocus=()=>{}, detailRemove=()=>{};\n    if (detailNode){\n      const rgb=F[detailNode.field].rgb;\n      detailColor=`rgb(${rgb.join(\",\")})`; detailLabelColor = light ? darken(rgb) : detailColor;\n      detailFieldLabel=F[detailNode.field].label; detailTitle=detailNode.title; detailAuthors=detailNode.authors;\n      detailRank=detailNode.rank.toLocaleString(); detailAbstract=detailNode.abstract; detailDoi=detailNode.doi;\n      const degree=this.engine?(this.engine.adj.get(detailNode.id)||[]).length:0;\n      detailMeta=[\n        {label:\"Published\", value:detailNode.pubDate},\n        {label:\"Published In\", value:detailNode.venue},\n        {label:\"Citations\", value:detailNode.citations.toLocaleString()},\n        {label:\"Citation Links\", value:\"\"+degree},\n      ];\n      detailFocus=()=>this.focusNode(detailNode.id); detailRemove=()=>this.removeSelected(detailNode.id);\n    }\n\n    return {\n      t, themeList, legendList, topNList, fieldsList, corpusNote, yearHistList, citeHistList, availList,\n      leftOpen:s.leftOpen, leftClosed:!s.leftOpen, rightOpen:s.rightOpen, rightClosed:!s.rightOpen,\n      leftWidth: s.leftOpen?\"296px\":\"120px\", rightWidth: s.rightOpen?\"400px\":\"128px\", ctrlBarWidth:\"400px\",\n      rightAnchor: s.rightOpen ? \"bottom:96px;\" : \"max-height:calc(100% - 28px);\",\n      ctrlLeft: (s.leftOpen?324:148)+\"px\", ctrlRight: (s.rightOpen?440:156)+\"px\",\n      toggleLeft:()=>this.setState({leftOpen:!s.leftOpen}, ()=>this.engine&&this.engine.resize()),\n      toggleRight:()=>this.setState({rightOpen:!s.rightOpen}, ()=>this.engine&&this.engine.resize()),\n      toggleAllFields:()=>this.toggleAllFields(), allFieldsLabel: allOn?\"None\":\"All\",\n      keyword:s.keyword, onKeyword:(e)=>this.onKeyword(e),\n      yearMin:s.yearMin, yearMax:s.yearMax, onYearMin:(e)=>this.onYearMin(e), onYearMax:(e)=>this.onYearMax(e),\n      minCites:s.minCites, minCitesFmt:fmt(s.minCites), onMinCites:(e)=>this.onMinCites(e),\n      resetView:()=>this.resetView(), cardClose:()=>this.closeCard(),\n      canvasRef:this.canvasRef, cardRef:this.cardRef, scrollRef:this.scrollRef, inputRef:this.inputRef,\n      shownCountFmt:s.shownCount.toLocaleString(), edgeCountFmt:s.edgeCount.toLocaleString(), selCountFmt:s.selectedIds.length,\n      hasSelection:s.selectedIds.length>0, noSelection:s.selectedIds.length===0,\n      selectedList, clearSelection:()=>this.clearSelection(),\n      chatTab, detailsTab, setTabChat:()=>this.setTab(\"chat\"), setTabDetail:()=>this.setTab(\"details\"),\n      tabChatStyle:tabBtn(chatTab), tabDetailStyle:tabBtn(detailsTab),\n      hasDetail:!!detailNode, noDetail:!detailNode, detailColor, detailLabelColor, detailFieldLabel,\n      detailTitle, detailAuthors, detailRank, detailAbstract, detailDoi, detailMeta, detailFocus, detailRemove,\n      messages, typing:s.typing, showPrompts:s.selectedIds.length>0,\n      promptList, chatInput:s.chatInput, onChatInput:(e)=>this.onChatInput(e), onChatKey:(e)=>this.onChatKey(e), sendChat:()=>this.sendChat(),\n      sendStyle:`width:32px; height:32px; flex:0 0 auto; border-radius:9px; border:none; cursor:${canSend?\"pointer\":\"default\"}; font-size:15px; font-weight:700; background:${canSend?t.accent:t.chipBg}; color:${canSend?t.onAccent:t.textFaint}; transition:all .15s;`,\n      toggleMode:()=>this.toggleMode(), modeIcon: s.themeKey===\"light\" ? \"☾\" : \"☀\",\n      cardNode, cardColor, cardLabelColor, cardFieldLabel, cardTitle, cardAuthors, cardYear, cardRank, cardCitesFmt, cardDegree, cardBtnLabel, cardBtnStyle, cardToggleSelect\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
